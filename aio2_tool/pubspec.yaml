name: natroff_aio
description: A new Flutter project.
publish_to: 'none'
version: 6.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Window
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.0
  google_fonts: ^6.1.0
  bitsdojo_window: ^0.1.6
  animations: ^2.0.11
  syncfusion_flutter_maps: ^23.1.43
  path_provider: ^2.1.1 
  path: ^1.8.3
  provider: ^6.1.1
  window_manager: ^0.3.7  
  video_player: ^2.8.1
  video_player_win: ^2.0.0
  screenshot: ^3.0.0
  intl: ^0.18.0
  file_picker: ^6.0.0


  # System Logic
  process_run: ^1.2.4
  win32: ^5.0.0
  ffi: ^2.1.0
  shared_preferences: ^2.2.2
  http: ^1.6.0
  html: ^0.15.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # AI & Web
  google_generative_ai: ^0.4.7  # AI Hatası için (Flash modelini tanır)
  webview_windows: ^0.4.0
  
  # Audio
  audioplayers: ^6.0.0
  get: ^4.7.3
  fl_chart: ^0.66.0
  url_launcher: ^6.2.1

dev_dependencies:
  drift_dev: ^2.14.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.6
flutter:
  uses-material-design: true
  
  # 'assets' kelimesi 'uses' ile aynı hizada olmalı (2 boşluk içeride)
  assets:
    - assets/music/
    - assets/X.mp4
    - assets/turkey.json
    - assets/Playstyles/
    - assets/gifs/
    - assets/takimlar/
    - assets/logos/
    - assets/plus/
    