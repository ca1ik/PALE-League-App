name: natroff_aio
description: A new Flutter project.
publish_to: 'none'
version: 6.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Window
  google_fonts: ^6.1.0
  bitsdojo_window: ^0.1.6
  animations: ^2.0.11
  syncfusion_flutter_maps: ^23.1.43
  provider: ^6.1.1
  window_manager: ^0.3.7  
  

  # System Logic
  process_run: ^1.2.4
  win32: ^5.0.0
  ffi: ^2.1.0
  shared_preferences: ^2.2.2
  http: ^1.6.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # AI & Web
  google_generative_ai: ^0.4.7  # AI Hatası için (Flash modelini tanır)
  webview_windows: ^0.4.0
  
  # Audio
  audioplayers: ^6.0.0
  video_player: ^2.8.1
  video_player_win: ^2.0.0
  get: ^4.7.3
  fl_chart: ^0.66.0

flutter:
  uses-material-design: true
  
  # 'assets' kelimesi 'uses' ile aynı hizada olmalı (2 boşluk içeride)
  assets:
    - assets/music/
    - assets/X.mp4
    - assets/turkey.json
    - assets/Playstyles/